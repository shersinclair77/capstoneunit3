name: M365 User Provisioning

on:
  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      csvFile:
        description: 'Path to CSV file with user data'
        required: true
        default: 'data/users.csv'
      whatIfMode:
        description: 'Run in WhatIf mode (no changes)'
        required: false
        type: boolean
        default: false
  
  # Optional: Schedule weekly Monday at 8 AM UTC
  schedule:
    - cron: '0 8 * * 1'

jobs:
  provision-users:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup PowerShell modules
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Microsoft.Graph -Force -Scope CurrentUser
          Install-Module -Name ExchangeOnlineManagement -Force -Scope CurrentUser
      
      - name: Run M365 Provisioning Script
        shell: powershell
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          $csvPath = "${{ github.workspace }}/${{ github.event.inputs.csvFile }}"
          $logPath = "${{ github.workspace }}/logs"
          $whatIfMode = ${{ github.event.inputs.whatIfMode || 'false' }}
          
          & "${{ github.workspace }}/scripts/automation scripts/PS_Provision_M365Users/Provision-M365Users.ps1" `
            -CsvFilePath $csvPath `
            -LogPath $logPath `
            -WhatIfMode $whatIfMode
      
      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provisioning-logs
          path: logs/
          retention-days: 30
