# =============================================================================
# .github/workflows/create-users.yml
#
# Manually triggered workflow to provision M365 users.
# Runs Pester unit tests first — provisioning only proceeds if all tests pass.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   - M365_TENANT_ID
#   - M365_CLIENT_ID
#   - M365_CLIENT_SECRET
#   - NOTIFICATION_EMAIL
# =============================================================================

name: Create M365 Users

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test:
    name: Run Pester Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -Force -SkipPublisherCheck -Scope CurrentUser
          Write-Host "Pester installed."

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path              = "./tests/M365Provisioning.Tests.ps1"
          $config.Output.Verbosity      = "Detailed"
          $config.TestResult.Enabled    = $true
          $config.TestResult.OutputPath = "./test-results/pester-results.xml"
          $config.TestResult.OutputFormat = "NUnitXml"
          New-Item -ItemType Directory -Force -Path "./test-results" | Out-Null
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
            Write-Error "$($result.FailedCount) test(s) failed. Provisioning will not run."
            exit 1
          }
          Write-Host "All $($result.PassedCount) tests passed." -ForegroundColor Green

      - name: Upload Pester test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 90

  provision:
    name: Provision Users in Microsoft 365
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Microsoft.Graph PowerShell module
        shell: pwsh
        run: |
          Install-Module Microsoft.Graph -Scope CurrentUser -Force -AllowClobber

      - name: Run user creation script
        shell: pwsh
        env:
          M365_TENANT_ID:      ${{ secrets.M365_TENANT_ID }}
          M365_CLIENT_ID:      ${{ secrets.M365_CLIENT_ID }}
          M365_CLIENT_SECRET:  ${{ secrets.M365_CLIENT_SECRET }}
          NOTIFICATION_EMAIL:  ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          ./scripts/Create-M365Users.ps1 `
            -TenantId          $env:M365_TENANT_ID `
            -ClientId          $env:M365_CLIENT_ID `
            -ClientSecret      $env:M365_CLIENT_SECRET `
            -NotificationEmail $env:NOTIFICATION_EMAIL `
            -RunId             "${{ github.run_id }}" `
            -CommitSha         "${{ github.sha }}" `
            -CsvPath           "./onboarding/users-to-onboard.csv"

      - name: Upload audit log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provisioning-audit-${{ github.run_id }}-${{ github.sha }}
          path: audit-logs/
          retention-days: 90
