# =============================================================================
# .github/workflows/create-users.yml
#
# Manually triggered workflow to provision M365 users.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   - M365_TENANT_ID
#   - M365_CLIENT_ID
#   - M365_CLIENT_SECRET
# =============================================================================

name: Create M365 Users

on:
  workflow_dispatch:  # Manual trigger only — never runs on push

jobs:
  create-users:
    name: Provision Users in Microsoft 365
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Microsoft.Graph PowerShell module
        shell: pwsh
        run: |
          Install-Module Microsoft.Graph -Scope CurrentUser -Force -AllowClobber
          Write-Host "Microsoft.Graph module installed."

      - name: Run user creation script
        shell: pwsh
        env:
          M365_TENANT_ID:     ${{ secrets.M365_TENANT_ID }}
          M365_CLIENT_ID:     ${{ secrets.M365_CLIENT_ID }}
          M365_CLIENT_SECRET: ${{ secrets.M365_CLIENT_SECRET }}
        run: |
          ./scripts/Create-M365Users.ps1 `
            -TenantId     $env:M365_TENANT_ID `
            -ClientId     $env:M365_CLIENT_ID `
            -ClientSecret $env:M365_CLIENT_SECRET
