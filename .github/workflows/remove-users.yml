# =============================================================================
# .github/workflows/remove-users.yml
#
# Manually triggered workflow to offboard M365 users from a CSV file.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   - M365_TENANT_ID
#   - M365_CLIENT_ID
#   - M365_CLIENT_SECRET
#   - NOTIFICATION_EMAIL
# =============================================================================

name: Remove M365 Users (Offboarding)

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  remove-users:
    name: Offboard Users from Microsoft 365
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Microsoft.Graph PowerShell module
        shell: pwsh
        run: |
          Install-Module Microsoft.Graph -Scope CurrentUser -Force -AllowClobber
          Write-Host "Microsoft.Graph module installed."

      - name: Run offboarding script
        shell: pwsh
        env:
          M365_TENANT_ID:      ${{ secrets.M365_TENANT_ID }}
          M365_CLIENT_ID:      ${{ secrets.M365_CLIENT_ID }}
          M365_CLIENT_SECRET:  ${{ secrets.M365_CLIENT_SECRET }}
          NOTIFICATION_EMAIL:  ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          ./scripts/Remove-M365Users.ps1 `
            -TenantId          $env:M365_TENANT_ID `
            -ClientId          $env:M365_CLIENT_ID `
            -ClientSecret      $env:M365_CLIENT_SECRET `
            -NotificationEmail $env:NOTIFICATION_EMAIL `
            -CsvPath           "./offboarding/users-to-offboard.csv" `
            -RunId             "${{ github.run_id }}" `
            -CommitSha         "${{ github.sha }}"

      # 10. Upload offboarding audit log as immutable workflow artifact
      - name: Upload offboarding audit log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offboarding-audit-${{ github.run_id }}-${{ github.sha }}
          path: audit-logs/
          retention-days: 90
